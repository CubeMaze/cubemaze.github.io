    <text x="0" y="136" fill="#7fe5ff" font-family="Inter, ui-sans-serif, system-ui" font-size="35" font-weight="800">Find your third direction.</text>
    <text x="0" y="224" fill="#c9d7eb" font-family="Inter, ui-sans-serif, system-ui" font-size="30">A minimalist iPhone and iPad puzzle game</text>
